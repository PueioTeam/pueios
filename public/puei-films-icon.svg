<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#4a1e8c"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="50" rx="22" fill="url(#shine)"/>
  <!-- Film strip -->
  <rect x="14" y="28" width="72" height="44" rx="4" fill="rgba(0,0,0,0.45)"/>
  <!-- Sprocket holes left -->
  <rect x="16" y="32" width="10" height="8" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="16" y="46" width="10" height="8" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="16" y="60" width="10" height="8" rx="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Sprocket holes right -->
  <rect x="74" y="32" width="10" height="8" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="74" y="46" width="10" height="8" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="74" y="60" width="10" height="8" rx="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Screen area -->
  <rect x="28" y="31" width="44" height="38" rx="2" fill="rgba(255,255,255,0.15)"/>
  <!-- Play button -->
  <polygon points="40,41 40,59 62,50" fill="white"/>
</svg>
