<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <circle cx="50" cy="55" r="38" fill="#111"/>
  <circle cx="50" cy="55" r="35" fill="#e02020"/>
  <!-- Wing split line -->
  <line x1="50" y1="22" x2="50" y2="90" stroke="#111" stroke-width="3"/>
  <!-- Dots left -->
  <circle cx="33" cy="45" r="7" fill="#111"/>
  <circle cx="28" cy="63" r="7" fill="#111"/>
  <circle cx="38" cy="76" r="6" fill="#111"/>
  <!-- Dots right -->
  <circle cx="67" cy="45" r="7" fill="#111"/>
  <circle cx="72" cy="63" r="7" fill="#111"/>
  <circle cx="62" cy="76" r="6" fill="#111"/>
  <!-- Head -->
  <circle cx="50" cy="22" r="16" fill="#111"/>
  <!-- Eyes -->
  <circle cx="44" cy="19" r="5" fill="white"/>
  <circle cx="56" cy="19" r="5" fill="white"/>
  <circle cx="44" cy="20" r="2.5" fill="#111"/>
  <circle cx="56" cy="20" r="2.5" fill="#111"/>
  <!-- Antennae -->
  <line x1="44" y1="8" x2="36" y2="2" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="35" cy="1" r="3" fill="#111"/>
  <line x1="56" y1="8" x2="64" y2="2" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="65" cy="1" r="3" fill="#111"/>
  <!-- Gloss -->
  <ellipse cx="38" cy="38" rx="10" ry="6" fill="rgba(255,255,255,0.25)" transform="rotate(-20 38 38)"/>
</svg>
