<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="55%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="50" rx="22" fill="url(#shine)"/>
  <!-- Ladybug body (ellipse) -->
  <ellipse cx="50" cy="56" rx="30" ry="26" fill="#dc2626"/>
  <!-- Head -->
  <circle cx="50" cy="28" r="13" fill="#1a1a1a"/>
  <!-- Wing split line -->
  <line x1="50" y1="30" x2="50" y2="82" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Dots on wings -->
  <circle cx="36" cy="48" r="6" fill="#1a1a1a"/>
  <circle cx="64" cy="48" r="6" fill="#1a1a1a"/>
  <circle cx="34" cy="65" r="5" fill="#1a1a1a"/>
  <circle cx="66" cy="65" r="5" fill="#1a1a1a"/>
  <!-- Antennae -->
  <line x1="44" y1="17" x2="34" y2="5" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="17" x2="66" y2="5" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="34" cy="5" r="3" fill="#1a1a1a"/>
  <circle cx="66" cy="5" r="3" fill="#1a1a1a"/>
  <!-- Eyes on head -->
  <circle cx="44" cy="28" r="3.5" fill="white"/>
  <circle cx="56" cy="28" r="3.5" fill="white"/>
  <circle cx="45" cy="29" r="1.5" fill="#1a1a1a"/>
  <circle cx="57" cy="29" r="1.5" fill="#1a1a1a"/>
</svg>
