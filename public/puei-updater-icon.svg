<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Puei Updater — circular refresh arrow with version badge -->
  <!-- Outer circle ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#0066cc" stroke-width="10"/>
  <!-- Inner fill -->
  <circle cx="50" cy="50" r="36" fill="#e8f4ff"/>
  <!-- Circular arrow — only 3/4 of circle, with arrowhead -->
  <path d="M50 14 A36 36 0 1 1 18 68" fill="none" stroke="#0055bb" stroke-width="11" stroke-linecap="round"/>
  <!-- Arrowhead at end of arc -->
  <polygon points="6,58 22,78 30,60" fill="#0055bb"/>
  <!-- Down arrow in center -->
  <rect x="44" y="34" width="12" height="22" rx="4" fill="#0066cc"/>
  <polygon points="34,54 50,72 66,54" fill="#0066cc"/>
  <!-- Top shine on ring -->
  <ellipse cx="50" cy="16" rx="20" ry="6" fill="rgba(255,255,255,0.55)"/>
</svg>
